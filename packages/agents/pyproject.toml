[project]
name = "vamos-agents"
version = "0.1.0"
description = "Reasoning, evaluation, and tracing for the Vamos financial advisor"
requires-python = ">=3.11"
dependencies = [
    "vamos-core",
    "anthropic>=0.40.0",
    "pydantic>=2.7",
    "langfuse>=2.50.0",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vamos_agents"]

[tool.uv.sources]
vamos-core = { workspace = true }
