[project]
name = "vamos-core"
version = "0.1.0"
description = "Core domain models, data loading, and analytics for the Vamos financial advisor"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vamos_core"]
