app = "vamos-web-shinjan"
primary_region = "bom"

[build]
  dockerfile = "apps/web/Dockerfile"
  [build.args]
    # Baked into the Next.js client bundle at build time. Must match the
    # deployed API app's public URL. If you rename the API app, update both
    # this line and the API_URL below.
    NEXT_PUBLIC_API_URL = "https://vamos-api-shinjan.fly.dev"

[env]
  NODE_ENV = "production"
  PORT = "4247"
  # Runtime env — preferred by lib/api.ts for server-side fetches. Changing
  # this takes effect on machine restart, no rebuild required.
  API_URL = "https://vamos-api-shinjan.fly.dev"
  NEXT_PUBLIC_API_URL = "https://vamos-api-shinjan.fly.dev"

[http_service]
  internal_port = 4247
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
