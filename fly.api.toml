app = "vamos-api"
primary_region = "sin"            # change to nearest region (bom=Mumbai, sin=Singapore, iad=Virginia, etc.)
kill_signal  = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "8247"
  VAMOS_DATA_DIR = "/app/data"
  ANTHROPIC_MODEL = "claude-sonnet-4-6"
  ANTHROPIC_EVAL_MODEL = "claude-haiku-4-5-20251001"
  # API_CORS_ORIGINS is set as a secret after the web URL is known

[http_service]
  internal_port = 8247
  force_https = true
  auto_stop_machines = "stop"      # scale to zero when idle → cheaper
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    timeout       = "5s"
    path          = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
