# fly.toml app configuration file generated for vamos-api-shinjan on 2026-04-23T21:56:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vamos-api-shinjan'
primary_region = 'bom'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]
  dockerfile = 'apps/api/Dockerfile'

[env]
  ANTHROPIC_EVAL_MODEL = 'claude-haiku-4-5-20251001'
  ANTHROPIC_MODEL = 'claude-sonnet-4-6'
  API_HOST = '0.0.0.0'
  API_PORT = '8247'
  LANGFUSE_HOST = 'https://us.cloud.langfuse.com'
  VAMOS_DATA_DIR = '/app/data'

[http_service]
  internal_port = 8247
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
